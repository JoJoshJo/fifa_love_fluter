  <style id="splash-screen-style">
    body {
      margin: 0;
      background-color: #080F0C;
      overflow: hidden;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .loading .brand {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: #EBF2EE;
      letter-spacing: 3px;
    }
    .loading .sub {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #F2C233;
      letter-spacing: 2px;
      margin-top: 8px;
      text-transform: uppercase;
    }
    .loading .spinner {
      margin-top: 32px;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(76, 181, 114, 0.2);
      border-top-color: #4CB572;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("loading")?.remove();
      document.getElementById("splash")?.remove();
      document.body.style.background = "transparent";
    }

    // Force-clear all Service Workers to fix caching issues
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
      });
    }
  </script>
</head>
<body>
  <div class="loading" id="loading">
    <div class="brand">TURF&amp;ARDOR</div>
    <div class="sub">World Cup 2026</div>
    <div class="spinner"></div>
  </div>
