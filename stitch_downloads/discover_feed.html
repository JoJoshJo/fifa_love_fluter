<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@300;400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              "on-error": "#690005",
              "surface-container": "#1a211e",
              "outline": "#89938e",
              "inverse-primary": "#006d39",
              "primary-fixed": "#8ff8ae",
              "on-secondary-fixed": "#3f0018",

              "on-primary-container": "#74dc95",

              "surface-container-low": "#0D1A13",
              "tertiary": "#F2C233",
              "secondary-fixed": "#ffd9e0",
              "background": "#080F0C",
              "tertiary-fixed": "#ffdf92",
              "on-error-container": "#ffdad6",
              "surface-bright": "#333b37",
              "on-tertiary-fixed": "#241a00",
              "on-tertiary-container": "#503d00",
              "on-surface": "#dde4df",

              "primary-fixed-dim": "#73db94",
              "on-primary-fixed-variant": "#00522a",
              "secondary-container": "#a5004b",
              "secondary": "#E8437A",

            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Space Mono"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .score-arc {
        background: conic-gradient(#4CB572 87%, #152B1E 0);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#080F0C]/70 backdrop-blur-xl flex items-center justify-between px-6 h-16 w-full border-none">
<div class="text-[22px] font-headline font-black uppercase tracking-tighter text-[#F2C233]">
            Turf&Ardor
        </div>
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-[#152B1E] border border-primary/20 text-primary transition-transform active:scale-95">
<span class="text-sm">🌍</span>
<span class="font-headline font-bold text-sm tracking-tight">11</span>
</div>
</header>
<main class="relative min-h-screen pt-20 pb-24 overflow-hidden flex flex-col items-center justify-start px-4">
<!-- Stacked Background Cards -->
<div class="relative w-full max-w-md h-[618px] flex flex-col items-center">
<!-- Card 3 (Bottom) -->
<div class="absolute top-0 w-full h-full rounded-[24px] bg-surface-container-low opacity-[0.35] scale-[0.90] -translate-y-6 border border-primary/10"></div>
<!-- Card 2 (Middle) -->
<div class="absolute top-0 w-full h-full rounded-[24px] bg-surface-container-high opacity-[0.6] scale-[0.95] -translate-y-3 border border-primary/15"></div>
<!-- Primary Swipe Card -->
<div class="relative z-10 w-full h-full rounded-[24px] overflow-hidden shadow-[0_32px_64px_rgba(0,0,0,0.6)] group">
<!-- Profile Image -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center" data-alt="Stunning close-up portrait of a vibrant Brazilian woman in a stylish yellow jersey in a sun-drenched stadium setting, editorial photography style" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCedAkHdcV_BJc_QLdcOAGKNsB-_KCVLU8gLOSFPpufb7GerSZnxHo8OWQ-6bvYmLECK5IgbB785ugABxT9Yn6pJe67bsICCYSzEsz9UXDv0XUd1aZkwh1IHejoXjHdam_1DUrE5bHmnIo95mYnTFmT64RXlFOPBIPMMsPdQHCpc6gyk3raBe1SedVlj0vqwrmLYBnELovB_jSYMuJPt3SyK_u1SjIEdL4H-n-kVVmC2ZbWjmFBITNgvy6_Ic0aGvjwLizH6HuBGRQz')">
</div>
<!-- Verified Badge -->
<div class="absolute top-5 right-5 z-20 flex items-center px-2.5 py-1 rounded-full bg-[#135E4B] border border-primary/30 backdrop-blur-md">
<span class="text-[9px] font-label font-bold text-primary tracking-widest">✓ VERIFIED</span>
</div>
<!-- Info Overlay -->
<div class="absolute bottom-0 w-full h-[40%] bg-[#0D1A13]/85 backdrop-blur-[20px] border-t border-primary/20 flex flex-col p-6">
<div class="flex justify-between items-start">
<div class="flex-1">
<div class="flex items-baseline gap-2">
<h1 class="text-[26px] font-headline font-bold text-on-surface leading-tight">Camila</h1>
<span class="text-[22px] font-body text-on-surface/60 font-light">26</span>
</div>
<div class="flex items-center gap-1.5 mt-1">
<span class="text-[13px] font-body text-[#9BB3AF]">🇧🇷 Brazil</span>
<span class="text-[13px] font-body text-on-surface/40">·</span>
<span class="text-[13px] font-body text-on-surface/40">Dallas</span>
</div>
</div>
<!-- Match Score Gauge -->
<div class="relative w-14 h-14 flex items-center justify-center">
<div class="absolute inset-0 rounded-full score-arc p-[3px]">
<div class="w-full h-full rounded-full bg-[#0D1A13] flex items-center justify-center">
<span class="text-[14px] font-headline font-bold text-primary">87%</span>
</div>
</div>
</div>
</div>
<!-- Interest Chips -->
<div class="flex flex-wrap gap-2 mt-5">
<span class="px-3 py-1.5 rounded-full bg-primary/12 text-[#A1D8B5] text-xs font-medium border border-primary/10 tracking-wide">⚽ Die-Hard Fan</span>
<span class="px-3 py-1.5 rounded-full bg-primary/12 text-[#A1D8B5] text-xs font-medium border border-primary/10 tracking-wide">🍽️ Foodie</span>
<span class="px-3 py-1.5 rounded-full bg-primary/12 text-[#A1D8B5] text-xs font-medium border border-primary/10 tracking-wide">🎶 Music</span>
</div>
</div>
</div>
</div>
<!-- Action Buttons centered under the card -->
<div class="flex items-center justify-center gap-6 mt-8 relative z-30">
<!-- NOPE -->
<button class="w-14 h-14 rounded-full bg-[#152B1E] border border-secondary flex items-center justify-center text-secondary transition-transform active:scale-90 group">
<span class="material-symbols-outlined text-2xl" data-icon="close">close</span>
</button>
<!-- SUPER -->
<button class="w-12 h-12 rounded-full bg-[#152B1E] border border-tertiary flex items-center justify-center text-tertiary transition-transform active:scale-90 group">
<span class="material-symbols-outlined text-xl" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<!-- LIKE -->
<button class="w-14 h-14 rounded-full bg-[#135E4B] border border-primary flex items-center justify-center text-primary shadow-[0_0_20px_rgba(76,183,114,0.3)] transition-transform active:scale-90 group">
<span class="material-symbols-outlined text-2xl" data-icon="favorite" data-weight="fill" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 h-[64px] pb-safe bg-[#080F0C]/95 backdrop-blur-[20px] border-t border-[#4CB572]/15 shadow-[0_-4px_24px_rgba(0,0,0,0.4)] flex justify-around items-center w-full px-2">
<!-- Discover Active -->
<a class="flex flex-col items-center justify-center text-[#4CB572] relative before:content-[''] before:absolute before:top-0 before:w-6 before:h-[3px] before:bg-[#4CB572] before:rounded-full group active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="local_fire_department" data-weight="fill" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-label text-[9px] uppercase tracking-widest mt-1">Discover</span>
</a>
<!-- Chat Inactive -->
<a class="flex flex-col items-center justify-center text-[#EBF2EE]/30 group hover:text-[#4CB572]/70 transition-colors active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
<span class="font-label text-[9px] uppercase tracking-widest mt-1">Chat</span>
</a>
<!-- World Cup Inactive -->
<a class="flex flex-col items-center justify-center text-[#EBF2EE]/30 group hover:text-[#4CB572]/70 transition-colors active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="trophy">trophy</span>
<span class="font-label text-[9px] uppercase tracking-widest mt-1">World Cup</span>
</a>
<!-- Me Inactive -->
<a class="flex flex-col items-center justify-center text-[#EBF2EE]/30 group hover:text-[#4CB572]/70 transition-colors active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label text-[9px] uppercase tracking-widest mt-1">Me</span>
</a>
</nav>
</body></html>
